<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuesta por tu Uma favorita</title>
    <link rel="stylesheet" href="css/style-formulario.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="container py-5">
    <h1 class="text-center mb-4">Apuesta por tu Uma favorita</h1>

    <form class="p-4 shadow rounded">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Introduce tu nombre">
        </div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" placeholder="ejemplo@correo.com">
        </div>

        <div class="mb-3">
            <label class="form-label">Selecciona tu Uma favorita</label>
            <select class="form-select">
                <option>Agnes Tachyon</option>
                <option>Cheval Grand</option>
                <option>Manhattan Cafe</option>
                <option>Matikanetannhauser</option>
                <option>Mejiro McQueen</option>
                <option>Mihono Bourbon</option>
                <option>Nice Nature</option>
                <option>Oguri Cap</option>
                <option>Rice Shower</option>
                <option>Silence Suzuka</option>
                <option>Special Week</option>
                <option>Tamamo Cross</option>
            </select>
        </div>

        <button type="button" class="btn btn-deeppink w-100">Enviar</button>

    </form>
</div>

</body>
</html>
